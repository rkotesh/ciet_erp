{% extends 'base.html' %}
{% load static %}

{% block title %}Mentor Dashboard | My Students{% endblock %}

{% block extra_js %}
{{ student_stats|json_script:"mentee-data" }}
<script>
    const updateModal = document.getElementById('updateModal');
    if (updateModal) {
        updateModal.addEventListener('show.bs.modal', function (event) {
            const button = event.relatedTarget;
            const studentId = button.getAttribute('data-student-id');
            const studentName = button.getAttribute('data-student-name');

            document.getElementById('modalStudentName').textContent = 'Update ' + studentName;
            document.getElementById('modalStudentIdMarks').value = studentId;
        });
    }

    const menteeData = JSON.parse(document.getElementById('mentee-data').textContent);
    const menteeCtx = document.getElementById('menteeChart');
    if (menteeCtx && menteeData) {
        new Chart(menteeCtx, {
            type: 'line',
            data: {
                labels: menteeData.map(s => (s.student?.user?.full_name || '').slice(0, 10)),
                datasets: [
                    {
                        label: 'CGPA',
                        data: menteeData.map(s => s.cgpa || 0),
                        borderColor: '#0a66c2',
                        tension: 0.3
                    },
                    {
                        label: 'Avg Marks / 10',
                        data: menteeData.map(s => (s.avg_marks || 0) / 10),
                        borderColor: '#60a5fa',
                        tension: 0.3
                    }
                ]
            },
            options: {
                maintainAspectRatio: false,
                plugins: { legend: { position: 'bottom' } }
            }
        });
    }
</script>
{% endblock %}
